<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - NY State Patrol</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/driver.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-brand">
            <h1>🚔 NY State Patrol</h1>
        </div>
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="dashboard.html">My Notices</a>
            <a href="#" onclick="logoutDriver()">Logout</a>
        </div>
    </nav>

    <!-- Breadcrumb -->
    <div class="breadcrumb">
        <a href="../index.html">Home</a> &rsaquo;
        <a href="dashboard.html">Driver Portal</a> &rsaquo;
        <span>My Profile</span>
    </div>

    <main class="form-container">

        <!-- Update Last Name -->
        <div class="form-card" style="margin-bottom: 1.5rem;">
            <h2>My Profile</h2>
            <p class="form-subtitle">Update your personal details below</p>

            <!-- API feedback -->
            <div class="api-message" id="apiMessage"></div>

            <!-- Update Last Name Section -->
            <div class="form-section">
                <h3>Update Last Name</h3>
                <div class="form-group">
                    <label for="newLastname">New Last Name *</label>
                    <input type="text" id="newLastname" placeholder="Enter new last name">
                    <span class="error-msg" id="newLastname-error"></span>
                </div>
                <div class="loading-indicator" id="lastnameLoader">
                    <span class="spinner"></span> Updating...
                </div>
                <button class="btn btn-primary" onclick="handleUpdateLastname()">
                    Update Last Name
                </button>
            </div>

            <!-- Update Address Section -->
            <div class="form-section">
                <h3>Update Address</h3>
                <div class="form-group">
                    <label for="driverLicense">Driver License Number *</label>
                    <input type="text" id="driverLicense" placeholder="Enter your licence number">
                    <span class="error-msg" id="driverLicense-error"></span>
                </div>
                <div class="form-group">
                    <label for="newAddress">New Address *</label>
                    <input type="text" id="newAddress" placeholder="Enter new address">
                    <span class="error-msg" id="newAddress-error"></span>
                </div>
                <div class="loading-indicator" id="addressLoader">
                    <span class="spinner"></span> Updating...
                </div>
                <button class="btn btn-primary" onclick="handleUpdateAddress()">
                    Update Address
                </button>
            </div>

        </div>
    </main>

    <footer>
        <p>&copy; 2025 New York State Patrol - Notice Management System</p>
    </footer>

    <script src="../js/validation.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="profile.js"></script>
</body>
</html>
