<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, intial-scale=1.0">
        <title>Driver Login - New-York State Patrol</title>
        <link rel="stylesheet" href="../css/main.css">
        <link rel="stylesheet" href="../css/driver.css">
    </head>
    <body>

        <!-- Navigation -->
         <nav calss="navbar">
            <div class="nav-brand">
                <a href="../index.html">Home</a>
                <a href="register.html">Register</a>
                <a href="../admin/login.html">Admin Login</a>
            </div>
         </nav>

        <!-- Breadcrumbs -->
        <div class="Breadcrumbs">
            <a href="../index.html">Home</a> &rsaquo;
            <span>Driver Login</span>
        </div>

        <!-- Login Form -->
        <main class="form-container">
            <div class="form-card">
                <h2>Driver Login</h2>
                <p class="form-subtitle">Access your citation dashboard</p>

                <div id="loginForm">

                    <div class="form-group">
                        <label for="username">Username *</label>
                        <input type="text" id="username" name="username" palceholder="Enter your username">
                        <span class="error-msg" id="username-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="password">Password *</label>
                        <input type="text" id="password" name="password" placeholder="Enter your password">
                        <span class="error-msg" id="password-error"></span>
                    </div>

                    <!-- Loading indicator -->
                     <div class="loading-indicator" id="loadingIndicator">
                        <span class="spinner"></span> Logging in...
                     </div>

                     <!-- API feedback -->
                      <div class="API-message" id="apiMessage"></div>

                      <div class="form-group">
                        <button class="btn-primary btn-full" id="loginBtn" onclick="handleLogin()">
                            Login
                        </button>
                      </div>

                </div>

                <p class="form-footer">Don't have an account? <a href="register.html">Register here</a></p>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 New-York State Patrol - Notice Management System</p>
        </footer>

        <script src="../js/validations.js"></script>
        <script src="../js/api.js"></script>
        <script src="../js/auth.js"></script>
        <script src="login.js"></script>
        
    </body>
</html>
